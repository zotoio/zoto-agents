# =============================================================================
# Zoto Eval System — .zoto/eval-system/config.yml
# =============================================================================
# Every key below is **commented out**. The values shown are the internal
# defaults that the plugin will apply when a key is absent. Uncomment any
# line(s) to override.
#
# Schema: plugins/zoto-eval-system/templates/schema/config.schema.json
# =============================================================================


# ─────────────────────────────  discovery  ───────────────────────────────────
# Where evals live, where to look for skills, what kinds of primitives to
# discover, and which paths to ignore.
# evalsDir: evals
# skillsRoots:
#   - .cursor/skills
#   - skills
#   - plugins/*/skills
# discoveryTargets:
#   - skill
#   - command
#   - agent
#   - hook
# ignore: []


# ──────────────────────────────  backends  ───────────────────────────────────
# `static` is the non-LLM backend (pytest for Python, vitest|jest for TS).
# `llm` configures the single unified LLM harness — every non-skill primitive
# emits a co-located `<kind>/evals/<name>.test.ts`. The runtime branch
# (scripted askQuestion answers vs single sendPrompt) is decided per case by
# the analyser's `requiresInteraction` flag — there is no `llm.strategy` /
# `llm.codeFramework` knob.
# static:
#   framework: pytest          # pytest | vitest | jest
# llm:
#   runtime: tsx               # tsx | node
#   model:
#     id: composer-2.5           # composer-2.5 | opus-4.6 | sonnet


# ────────────────────────────────  judge  ────────────────────────────────────
# Model used by /zoto-eval-judge for adversarial scoring.
# judgeModel: opus-4.6


# ────────────────────────────  manual checklists  ────────────────────────────
# manualChecklists:
#   enabled: false


# ────────────────────────────  extra automation  ─────────────────────────────
# Additional test runners to scaffold alongside the primary backends.
# additionalAutomation: []     # any of: vitest, jest, bats


# ───────────────────────────────  analyser  ──────────────────────────────────
# Cost / concurrency caps for the LLM-driven primitive analyser.
# analyser:
#   concurrency: 4             # min 1, max 32
#   maxCallsPerInvocation: 50  # min 1, max 1000  (cache hits do NOT count)


# ───────────────────────────  run retention (gc)  ────────────────────────────
# Maximum number of run-folders to keep under {evalsDir}/_runs/.
# runs:
#   retention: 30              # min 1


# ────────────────────────────────  update  ───────────────────────────────────
# Drift-detection rules consumed by /zoto-eval-update.
# update:
#   criticalChangeRules:
#     addedTargetWithoutCoverage: true
#     removedTargetWithActiveCases: true
#     skillFrontmatterChange: true
#     publicSurfaceChange: true
#     promptTemplateChange: true
#   preserveUserAuthoredCases: true       # hard-coded contract — do not change
#   writeMetaMarker: true                 # hard-coded contract — do not change
#   manifestPath: .zoto/eval-system/manifest.yml
#   historyPath: .zoto/eval-system/manifest.history.yml
#   rediscoverWithSameDefaults: true
#   checkExitCodeOnCriticalDrift: 2       # min 1, max 255
