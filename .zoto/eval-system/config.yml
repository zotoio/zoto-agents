# =============================================================================
# Zoto Eval System — .zoto/eval-system/config.yml
# =============================================================================
# Every key below is shown alongside its internal default. Lines starting with
# `#` are inactive — uncomment to override. Lines without `#` are this repo's
# active overrides (preserved from the prior .zoto-eval-system/config.json).
#
# Schema: plugins/zoto-eval-system/templates/schema/config.schema.json
# =============================================================================


# ─────────────────────────────  discovery  ───────────────────────────────────
# evalsDir: evals
# skillsRoots:
#   - .cursor/skills
#   - skills
#   - plugins/*/skills
# discoveryTargets:
#   - skill
#   - command
#   - agent
#   - hook

# Active override: skip CRUX primitives in this repo.
ignore:
  - ".cursor/skills/crux-*"
  - ".cursor/commands/crux-*.md"
  - ".cursor/agents/crux-cursor-*.md"
  - ".cursor/hooks/crux-*"


# ──────────────────────────────  backends  ───────────────────────────────────
# Active overrides: this repo runs vitest for static evals and the `code`
# strategy (per-primitive *.test.ts files) for LLM evals.
static:
  framework: vitest          # default: pytest

llm:
  # runtime: tsx
  strategy: code             # default: declarative
  codeFramework: vitest
  # model:
  #   id: composer-2


# ────────────────────────────────  judge  ────────────────────────────────────
# judgeModel: opus-4.6


# ────────────────────────────  manual checklists  ────────────────────────────
# manualChecklists:
#   enabled: false


# ────────────────────────────  extra automation  ─────────────────────────────
# additionalAutomation: []


# ───────────────────────────────  analyser  ──────────────────────────────────
# analyser:
#   concurrency: 4
#   maxCallsPerInvocation: 50


# ───────────────────────────  run retention (gc)  ────────────────────────────
# runs:
#   retention: 30


# ────────────────────────────────  update  ───────────────────────────────────
