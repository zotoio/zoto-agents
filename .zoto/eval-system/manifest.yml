    public_surface:
      frontmatter:
        name: zoto-eval-updater
        model: claude-opus-4-8[]
        description: '"Diff-aware eval updater. Uses zoto-update-evals to detect drift
          between covered targets and generated eval cases, re-invokes the LLM
          analyser per drifted primitive, and dispatches per-framework static
          regeneration plus the single unified LLM eval regeneration
          (`regenerateLlm`) through hard-coded user-case preservation gates.
          Never mutates user-authored cases or user-authored test files — the
          `_meta.generated === true` (case) and `// _meta.generated\\: true`
          (file) contracts are enforced at runtime AND compile time. On
          palette-driven flows or any unexpected apply branch, returns
          structured `needs_user_input` for the owning command — never
          `askQuestion` from the subagent."'
    eval_files: []
