          by the invoking command; never calls askQuestion. Reads the manifest
          snapshot via plugins/zoto-eval-system/engine/manifest-snapshot.ts,
          emits a cleanup_plan validated against
          templates/schema/cleanup-plan.schema.json when static.framework
          changes, and stamps _meta.primitive_analysis.invalidate=true on every
          cached primitive analysis after a switch. The unified LLM eval harness
          ships a single backend shape (one TS-everywhere co-located eval per
          target) with no per-repo selector axis. Rejects bundled false for
          update.preserveUserAuthoredCases or update.writeMetaMarker before any
          config write; rejects configs that violate those contracts.
    eval_files: []
