- id: 802be55
  slug: fail-safe-destructive-migrations
  title: 'Make destructive migrations fail-safe: dry-run, single-commit checkpoint, and log AST-extraction failures to an
    audit instead of writing corrupt output'
  description: 'For one-shot destructive migrations: provide a --keep-ts-style dry-run that writes new artefacts without deleting
    originals; land the whole migration in a single commit so git revert cleanly restores prior state; make the migration
    idempotent (re-run = no-op); when parsing/AST extraction fails, leave the file un-migrated with a warning and record it
    in a migration audit — NEVER silently emit corrupt output. Partial migration can corrupt declarative JSON; validate with
    eval:list after each batch.'
