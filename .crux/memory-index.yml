- id: 724d6f7
  slug: eval-migration-meta-generated-gate
  title: Destructive eval migrations are gated by the `_meta.generated === true` marker; cases/files without it are byte-preserved
  description: 'Any automated regeneration, migration, or rewrite of eval files MUST treat _meta.generated === true (case
    marker) and // _meta.generated: true / # _meta.generated: True (file marker, line 1, with a 20-line backward-compat scan)
    as the hard gate. Cases lacking _meta or with generated !== true are user-authored and must be byte-preserved; rewrite
    subtasks should diff preserved rows post-write to prove zero byte changes.'
