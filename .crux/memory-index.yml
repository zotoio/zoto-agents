  slug: declarative-format-typed-runner-escape-hatch
  title: Unify on one declarative format with a typed `runner` escape hatch instead of maintaining parallel imperative/declarative
    tracks
  description: When a system has drifted into dual code+declarative tracks, collapse to a single canonical declarative (JSON)
    format and add a typed discriminator field (runner) that delegates rare imperative cases to a TS file via a typed contract
    (RunnerParams). A custom Vite plugin (resolveId + load) loads the JSON suites in-memory as Vitest tests — no .tmp.ts shim
    files on disk — preserving test-explorer/reporters/parallelism.
