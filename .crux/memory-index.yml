- id: 07bb2df
  slug: spec-resume-reconcile-filesystem-vs-status
  title: On spec resume, reconcile filesystem reality against status files before acting — status often lags the disk
  description: 'When resuming an interrupted spec execution, status files can read pending/incomplete while artefacts already
    exist on disk (and vice versa). Reconcile on-disk reality with status files first, then proceed. Either lag direction
    is possible: status pending while work done, or status stale while work genuinely not done.'
