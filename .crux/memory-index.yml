- id: 36e1e9c
  slug: eval-cases-user-visible-outcomes-realistic-prompts
  title: Eval cases must assert user-visible outcomes with realistic, transcript-seeded prompts — never internal mechanics
  description: 'Generated eval prompts should read like real Cursor user messages (seeded from redacted agent transcripts,
    falling back to README/SKILL ## Usage), using realistic invocation shapes per kind. Assertions must check user-visible
    outcomes (artefacts, exit codes, on-screen guidance, manifest rows) — NOT internal mechanics. Internal-mechanic assertions
    are allowed ONLY when they encode a hard contract, cited in an exception register.'
