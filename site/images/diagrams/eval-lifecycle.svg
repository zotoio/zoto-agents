<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" font-family="system-ui, -apple-system, sans-serif">
  <title>Eval System Lifecycle</title>
  <desc>Six-step horizontal flow for the eval-system: init  configure  create  execute  judge  compare. The update step sits below the spine and arrows back into create and execute, indicating that updates run as a continuous sync loop. Static (pytest) and LLM (@cursor/sdk) backends are annotated.</desc>
  <defs>
    <marker id="arrow-accent" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="#00ff7f"/>
    </marker>
    <marker id="arrow-dim" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="#6a8a6a"/>
    </marker>
    <style>
      .panel { fill: #0f1a0f; stroke: #1a3a1a; stroke-width: 1.25; }
      .step { fill: #0f1a0f; stroke: #1a3a1a; stroke-width: 1.5; }
      .step-active { fill: #0f1a0f; stroke: #00ff7f; stroke-width: 2; }
      .label-title { fill: #c8ffc8; font-size: 16px; font-weight: 700; }
      .label-sub { fill: #6a8a6a; font-size: 12px; }
      .label-tag { fill: #00ff7f; font-size: 11px; font-weight: 600; }
      .header { fill: #c8ffc8; font-size: 22px; font-weight: 700; }
      .footer { fill: #6a8a6a; font-size: 11px; }
    </style>
  </defs>

  <rect width="1200" height="700" fill="#000000" rx="10"/>
  <text x="600" y="48" text-anchor="middle" class="header">Eval System Lifecycle</text>
  <text x="600" y="74" text-anchor="middle" class="label-sub">Six commands, one structured loop. Static + LLM backends ride the same spine.</text>

  <!-- Spine -->
  <line x1="120" y1="280" x2="1080" y2="280" stroke="#1a3a1a" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Step 1: init -->
  <rect x="80" y="200" width="160" height="160" rx="8" class="step-active"/>
  <text x="160" y="232" text-anchor="middle" class="label-title">init</text>
  <text x="160" y="252" text-anchor="middle" class="label-sub">/z-eval-init</text>
  <text x="160" y="296" text-anchor="middle" class="label-sub">Scan repo, propose</text>
  <text x="160" y="312" text-anchor="middle" class="label-sub">covered targets, write</text>
  <text x="160" y="328" text-anchor="middle" class="label-sub">manifest snapshot.</text>

  <!-- Step 2: configure -->
  <rect x="260" y="200" width="160" height="160" rx="8" class="step"/>
  <text x="340" y="232" text-anchor="middle" class="label-title">configure</text>
  <text x="340" y="252" text-anchor="middle" class="label-sub">/z-eval-configure</text>
  <text x="340" y="296" text-anchor="middle" class="label-sub">Pick framework, LLM</text>
  <text x="340" y="312" text-anchor="middle" class="label-sub">strategy, codeFramework.</text>
  <text x="340" y="328" text-anchor="middle" class="label-sub">.zoto/eval-system/config.yml</text>

  <!-- Step 3: create -->
  <rect x="440" y="200" width="160" height="160" rx="8" class="step"/>
  <text x="520" y="232" text-anchor="middle" class="label-title">create</text>
  <text x="520" y="252" text-anchor="middle" class="label-sub">/z-eval-create</text>
  <text x="520" y="296" text-anchor="middle" class="label-sub">Stamp pytest + LLM</text>
  <text x="520" y="312" text-anchor="middle" class="label-sub">backends, generate</text>
  <text x="520" y="328" text-anchor="middle" class="label-sub">cases per primitive.</text>

  <!-- Step 4: execute -->
  <rect x="620" y="200" width="160" height="160" rx="8" class="step"/>
  <text x="700" y="232" text-anchor="middle" class="label-title">execute</text>
  <text x="700" y="252" text-anchor="middle" class="label-sub">/z-eval-execute</text>
  <text x="700" y="296" text-anchor="middle" class="label-sub">Run static + LLM,</text>
  <text x="700" y="312" text-anchor="middle" class="label-sub">drop timestamped run</text>
  <text x="700" y="328" text-anchor="middle" class="label-sub">under evals/_runs/.</text>

  <!-- Step 5: judge -->
  <rect x="800" y="200" width="160" height="160" rx="8" class="step"/>
  <text x="880" y="232" text-anchor="middle" class="label-title">judge</text>
  <text x="880" y="252" text-anchor="middle" class="label-sub">/z-eval-judge</text>
  <text x="880" y="296" text-anchor="middle" class="label-sub">Adversarial review of</text>
  <text x="880" y="312" text-anchor="middle" class="label-sub">graders, verbosity,</text>
  <text x="880" y="328" text-anchor="middle" class="label-sub">accuracy regressions.</text>

  <!-- Step 6: compare -->
  <rect x="980" y="200" width="160" height="160" rx="8" class="step"/>
  <text x="1060" y="232" text-anchor="middle" class="label-title">compare</text>
  <text x="1060" y="252" text-anchor="middle" class="label-sub">/z-eval-compare</text>
  <text x="1060" y="296" text-anchor="middle" class="label-sub">Cross-run dataset +</text>
  <text x="1060" y="312" text-anchor="middle" class="label-sub">/canvas hand-off for</text>
  <text x="1060" y="328" text-anchor="middle" class="label-sub">model A vs B.</text>

  <!-- Spine arrows -->
  <line x1="240" y1="280" x2="260" y2="280" stroke="#00ff7f" stroke-width="2" marker-end="url(#arrow-accent)"/>
  <line x1="420" y1="280" x2="440" y2="280" stroke="#00ff7f" stroke-width="2" marker-end="url(#arrow-accent)"/>
  <line x1="600" y1="280" x2="620" y2="280" stroke="#00ff7f" stroke-width="2" marker-end="url(#arrow-accent)"/>
  <line x1="780" y1="280" x2="800" y2="280" stroke="#00ff7f" stroke-width="2" marker-end="url(#arrow-accent)"/>
  <line x1="960" y1="280" x2="980" y2="280" stroke="#00ff7f" stroke-width="2" marker-end="url(#arrow-accent)"/>

  <!-- update sync loop (below spine) -->
  <rect x="440" y="450" width="340" height="120" rx="8" fill="#0f1a0f" stroke="#5cffaf" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="610" y="486" text-anchor="middle" class="label-title">update (continuous sync)</text>
  <text x="610" y="510" text-anchor="middle" class="label-sub">/z-eval-update  diff covered targets vs cases,</text>
  <text x="610" y="528" text-anchor="middle" class="label-sub">re-stamp generated cases, preserve user-authored ones.</text>
  <text x="610" y="552" text-anchor="middle" class="label-tag">_meta.generated === true</text>

  <!-- update arrows back into create + execute -->
  <line x1="520" y1="450" x2="520" y2="365" stroke="#5cffaf" stroke-width="1.75" stroke-dasharray="4,3" marker-end="url(#arrow-accent)"/>
  <line x1="700" y1="450" x2="700" y2="365" stroke="#5cffaf" stroke-width="1.75" stroke-dasharray="4,3" marker-end="url(#arrow-accent)"/>

  <!-- Backend split annotation -->
  <rect x="80" y="450" width="280" height="120" rx="8" class="panel"/>
  <text x="220" y="486" text-anchor="middle" class="label-title">Two backends, one suite</text>
  <text x="220" y="514" text-anchor="middle" class="label-sub"><tspan fill="#00ff7f" font-weight="600">static.</tspan> pytest  fast, deterministic</text>
  <text x="220" y="536" text-anchor="middle" class="label-sub"><tspan fill="#00ff7f" font-weight="600">llm.</tspan> @cursor/sdk  slow, judged</text>
  <text x="220" y="558" text-anchor="middle" class="label-sub">aggregate  report.yml</text>

  <!-- advise (sibling to compare) -->
  <rect x="860" y="450" width="280" height="120" rx="8" class="panel"/>
  <text x="1000" y="486" text-anchor="middle" class="label-title">/z-eval-advise (sibling)</text>
  <text x="1000" y="514" text-anchor="middle" class="label-sub">Five-dimension scoreboard:</text>
  <text x="1000" y="536" text-anchor="middle" class="label-sub">trigger / schema / regression /</text>
  <text x="1000" y="558" text-anchor="middle" class="label-sub">citation / checklist coverage.</text>

  <!-- Footer -->
  <text x="600" y="660" text-anchor="middle" class="footer">zoto-eval-system v0.3.1  Static + LLM eval suites, kept in lock-step with code.</text>
</svg>
