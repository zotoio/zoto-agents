<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" width="1400" height="520" font-family="system-ui, -apple-system, sans-serif" aria-hidden="false" role="img">
  <title>Eval Strategy Bridge — Analyser-Driven LLM Backend Routing</title>
  <desc>Left-to-right pipeline: source primitive through the zoto-eval-analyser-subagent, which emits requiresInteraction and optional interactionStyle per target. The stamper routes to declarative JSON evals or code-strategy TypeScript tests. Interactive code-strategy cases pass through evals/llm/_shared/askquestion-bridge.ts before @cursor/sdk Agent.run. Both paths write report.yml rows annotated with backend declarative or code.</desc>
  <defs>
    <marker id="arrow-accent" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="#00ff7f"/>
    </marker>
    <marker id="arrow-branch" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="#5cffaf"/>
    </marker>
    <style>
      .bg { fill: #000000; }
      .box { fill: #0f1a0f; stroke: #1a3a1a; stroke-width: 1.5; }
      .box-accent { fill: #0f1a0f; stroke: #00ff7f; stroke-width: 2; }
      .box-bridge { fill: #0f1a0f; stroke: #5cffaf; stroke-width: 2; }
      .box-output { fill: #0f1a0f; stroke: #c8ffc8; stroke-width: 2; }
      .header { fill: #c8ffc8; font-size: 22px; font-weight: 700; }
      .subheader { fill: #6a8a6a; font-size: 12px; }
      .label { fill: #c8ffc8; font-size: 12px; font-weight: 700; font-family: ui-monospace, monospace; }
      .label-sm { fill: #6a8a6a; font-size: 10px; font-family: ui-monospace, monospace; }
      .branch-label { fill: #5cffaf; font-size: 11px; font-weight: 600; }
      .footer { fill: #6a8a6a; font-size: 11px; }
    </style>
  </defs>

  <rect width="1400" height="520" class="bg" rx="10"/>
  <text x="700" y="40" text-anchor="middle" class="header">Eval Strategy Bridge — Analyser-Driven Routing</text>
  <text x="700" y="64" text-anchor="middle" class="subheader">Per-target backend selection at stamp time; interactive cases simulate AskQuestion via askquestion-bridge.ts</text>

  <!-- Row 1: main pipeline -->
  <rect x="30" y="100" width="120" height="72" rx="8" class="box"/>
  <text x="90" y="128" text-anchor="middle" class="label">Source</text>
  <text x="90" y="146" text-anchor="middle" class="label-sm">primitive</text>
  <text x="90" y="162" text-anchor="middle" class="label-sm">SKILL.md / cmd</text>

  <line x1="150" y1="136" x2="178" y2="136" stroke="#00ff7f" stroke-width="2" marker-end="url(#arrow-accent)"/>

  <rect x="180" y="100" width="150" height="72" rx="8" class="box-accent"/>
  <text x="255" y="124" text-anchor="middle" class="label">Analyser</text>
  <text x="255" y="142" text-anchor="middle" class="label-sm">zoto-eval-analyser</text>
  <text x="255" y="158" text-anchor="middle" class="label-sm">-subagent</text>

  <line x1="330" y1="136" x2="358" y2="136" stroke="#00ff7f" stroke-width="2" marker-end="url(#arrow-accent)"/>

  <rect x="360" y="92" width="170" height="88" rx="8" class="box-accent"/>
  <text x="445" y="118" text-anchor="middle" class="label">Classification</text>
  <text x="445" y="136" text-anchor="middle" class="label-sm">{requiresInteraction,</text>
  <text x="445" y="152" text-anchor="middle" class="label-sm"> interactionStyle}</text>
  <text x="445" y="170" text-anchor="middle" class="label-sm">per target</text>

  <line x1="530" y1="136" x2="558" y2="136" stroke="#00ff7f" stroke-width="2" marker-end="url(#arrow-accent)"/>

  <rect x="560" y="100" width="120" height="72" rx="8" class="box"/>
  <text x="620" y="128" text-anchor="middle" class="label">Stamper</text>
  <text x="620" y="146" text-anchor="middle" class="label-sm">eval-stamp /</text>
  <text x="620" y="162" text-anchor="middle" class="label-sm">update apply</text>

  <!-- Branch from stamper -->
  <line x1="680" y1="136" x2="720" y2="136" stroke="#00ff7f" stroke-width="2"/>
  <line x1="720" y1="136" x2="720" y2="220" stroke="#5cffaf" stroke-width="2"/>
  <line x1="720" y1="136" x2="720" y2="52" stroke="#5cffaf" stroke-width="2"/>
  <line x1="720" y1="52" x2="820" y2="52" stroke="#5cffaf" stroke-width="2" marker-end="url(#arrow-branch)"/>
  <line x1="720" y1="220" x2="820" y2="220" stroke="#5cffaf" stroke-width="2" marker-end="url(#arrow-branch)"/>

  <text x="770" y="44" text-anchor="middle" class="branch-label">false</text>
  <text x="770" y="212" text-anchor="middle" class="branch-label">true</text>

  <!-- Declarative branch (top) -->
  <rect x="822" y="24" width="200" height="56" rx="8" class="box"/>
  <text x="922" y="48" text-anchor="middle" class="label">Declarative JSON</text>
  <text x="922" y="66" text-anchor="middle" class="label-sm">plugins/*/evals/**/evals.json</text>

  <line x1="1022" y1="52" x2="1060" y2="52" stroke="#00ff7f" stroke-width="2" marker-end="url(#arrow-accent)"/>
  <text x="1040" y="42" text-anchor="middle" class="label-sm">eval:llm:declarative</text>

  <!-- Code branch (bottom) -->
  <rect x="822" y="192" width="200" height="56" rx="8" class="box"/>
  <text x="922" y="216" text-anchor="middle" class="label">Code-strategy TS</text>
  <text x="922" y="234" text-anchor="middle" class="label-sm">evals/llm/test_*.test.ts</text>

  <rect x="1040" y="176" width="190" height="88" rx="8" class="box-bridge"/>
  <text x="1135" y="200" text-anchor="middle" class="label">askquestion-bridge</text>
  <text x="1135" y="218" text-anchor="middle" class="label-sm">evals/llm/_shared/</text>
  <text x="1135" y="234" text-anchor="middle" class="label-sm">askquestion-bridge.ts</text>
  <text x="1135" y="252" text-anchor="middle" class="label-sm">interactive only</text>

  <line x1="1022" y1="220" x2="1038" y2="220" stroke="#5cffaf" stroke-width="2" marker-end="url(#arrow-branch)"/>
  <text x="1030" y="210" text-anchor="middle" class="label-sm">eval:llm:code</text>

  <!-- Merge to SDK -->
  <line x1="1120" y1="52" x2="1240" y2="52" stroke="#00ff7f" stroke-width="2"/>
  <line x1="1240" y1="52" x2="1240" y2="120" stroke="#00ff7f" stroke-width="2"/>
  <line x1="1230" y1="220" x2="1240" y2="220" stroke="#00ff7f" stroke-width="2"/>
  <line x1="1240" y1="220" x2="1240" y2="120" stroke="#00ff7f" stroke-width="2"/>

  <rect x="1180" y="100" width="140" height="56" rx="8" class="box-accent"/>
  <text x="1250" y="124" text-anchor="middle" class="label">@cursor/sdk</text>
  <text x="1250" y="142" text-anchor="middle" class="label-sm">Agent.run</text>

  <line x1="1250" y1="156" x2="1250" y2="300" stroke="#00ff7f" stroke-width="2" marker-end="url(#arrow-accent)"/>

  <rect x="1160" y="302" width="180" height="56" rx="8" class="box"/>
  <text x="1250" y="326" text-anchor="middle" class="label">zoto-llm-reporter</text>
  <text x="1250" y="344" text-anchor="middle" class="label-sm">writer / flush</text>

  <line x1="1250" y1="358" x2="1250" y2="390" stroke="#00ff7f" stroke-width="2" marker-end="url(#arrow-accent)"/>

  <rect x="1120" y="392" width="260" height="72" rx="8" class="box-output"/>
  <text x="1250" y="418" text-anchor="middle" class="label">report.yml</text>
  <text x="1250" y="436" text-anchor="middle" class="label-sm">backend: declarative | code</text>
  <text x="1250" y="452" text-anchor="middle" class="label-sm">interaction_style: synthetic</text>

  <!-- Left-side reporter path label -->
  <line x1="922" y1="80" x2="922" y2="330" stroke="#1a3a1a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="922" y1="330" x2="1160" y2="330" stroke="#1a3a1a" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arrow-accent)"/>

  <text x="700" y="498" text-anchor="middle" class="footer">Hybrid suites may run both eval:llm:declarative and eval:llm:code in one pnpm run eval:full pass. Global llm.strategy in config.yml is the fallback default only.</text>
</svg>
