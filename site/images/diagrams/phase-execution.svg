<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560" font-family="system-ui, -apple-system, sans-serif">
  <title>Parallel Phase Execution Model &#x2014; subtasks run in parallel within phases, with adversarial verification gates</title>
  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#58a6ff"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#8b949e"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3fb950"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f85149"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="560" fill="#0d1117" rx="8"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="600">Parallel Phase Execution Model</text>
  <text x="480" y="50" text-anchor="middle" fill="#8b949e" font-size="11">Subtasks within a phase run in parallel (up to parallelLimit). Adversarial verification gates separate phases.</text>

  <!-- Config note -->
  <rect x="740" y="62" width="200" height="32" rx="4" fill="#161b22" stroke="#3fb950" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="840" y="76" text-anchor="middle" fill="#3fb950" font-size="10">parallelLimit: 4 (default)</text>
  <text x="840" y="88" text-anchor="middle" fill="#8b949e" font-size="9">from config.json</text>

  <!-- === PHASE 1 === -->
  <rect x="20" y="105" width="168" height="180" rx="6" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
  <rect x="20" y="105" width="168" height="24" rx="6" fill="#58a6ff"/>
  <text x="104" y="121" text-anchor="middle" fill="#0d1117" font-size="11" font-weight="700">Phase 1 (Parallel)</text>

  <!-- Subtasks in Phase 1 -->
  <rect x="34" y="140" width="140" height="34" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="104" y="155" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="500">Subtask 01</text>
  <text x="104" y="168" text-anchor="middle" fill="#8b949e" font-size="8">generalPurpose</text>

  <rect x="34" y="180" width="140" height="34" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="104" y="195" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="500">Subtask 02</text>
  <text x="104" y="208" text-anchor="middle" fill="#8b949e" font-size="8">generalPurpose</text>

  <rect x="34" y="220" width="140" height="34" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="104" y="235" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="500">Subtask 03</text>
  <text x="104" y="248" text-anchor="middle" fill="#8b949e" font-size="8">generalPurpose</text>

  <!-- Parallel indicator -->
  <line x1="28" y1="146" x2="28" y2="248" stroke="#58a6ff" stroke-width="2" stroke-dasharray="2,2"/>
  <text x="26" y="198" fill="#58a6ff" font-size="7" text-anchor="end" transform="rotate(-90, 26, 198)">PARALLEL</text>

  <!-- Arrow Phase 1 to Gate 1 -->
  <line x1="188" y1="195" x2="205" y2="195" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- === VERIFICATION GATE 1 === -->
  <g transform="translate(213, 150)">
    <polygon points="25,0 50,15 50,75 25,90 0,75 0,15" fill="#161b22" stroke="#d29922" stroke-width="2"/>
    <text x="25" y="40" text-anchor="middle" fill="#d29922" font-size="9" font-weight="700">Judge</text>
    <text x="25" y="52" text-anchor="middle" fill="#d29922" font-size="8">Gate</text>
    <text x="25" y="66" text-anchor="middle" fill="#8b949e" font-size="7">Verify</text>
  </g>

  <!-- Gate 1 pass arrow -->
  <line x1="263" y1="195" x2="280" y2="195" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="272" y="188" text-anchor="middle" fill="#3fb950" font-size="7">Pass</text>

  <!-- Gate 1 fail arrow -->
  <line x1="238" y1="240" x2="238" y2="274" stroke="#f85149" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <rect x="200" y="280" width="76" height="24" rx="4" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
  <text x="238" y="296" text-anchor="middle" fill="#f85149" font-size="9" font-weight="600">BLOCKED</text>

  <!-- === PHASE 2 === -->
  <rect x="288" y="105" width="138" height="180" rx="6" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
  <rect x="288" y="105" width="138" height="24" rx="6" fill="#58a6ff"/>
  <text x="357" y="121" text-anchor="middle" fill="#0d1117" font-size="11" font-weight="700">Phase 2</text>

  <rect x="300" y="142" width="114" height="34" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="357" y="157" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="500">Subtask 04</text>
  <text x="357" y="170" text-anchor="middle" fill="#8b949e" font-size="8">generalPurpose</text>

  <rect x="300" y="184" width="114" height="34" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="357" y="199" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="500">Subtask 05</text>
  <text x="357" y="212" text-anchor="middle" fill="#8b949e" font-size="8">shell</text>

  <!-- Arrow Phase 2 to Gate 2 -->
  <line x1="426" y1="195" x2="443" y2="195" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- === VERIFICATION GATE 2 === -->
  <g transform="translate(451, 150)">
    <polygon points="25,0 50,15 50,75 25,90 0,75 0,15" fill="#161b22" stroke="#d29922" stroke-width="2"/>
    <text x="25" y="40" text-anchor="middle" fill="#d29922" font-size="9" font-weight="700">Judge</text>
    <text x="25" y="52" text-anchor="middle" fill="#d29922" font-size="8">Gate</text>
    <text x="25" y="66" text-anchor="middle" fill="#8b949e" font-size="7">Verify</text>
  </g>

  <!-- Gate 2 pass arrow -->
  <line x1="501" y1="195" x2="518" y2="195" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="510" y="188" text-anchor="middle" fill="#3fb950" font-size="7">Pass</text>

  <!-- === PHASE 3 === -->
  <rect x="526" y="105" width="120" height="180" rx="6" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
  <rect x="526" y="105" width="120" height="24" rx="6" fill="#58a6ff"/>
  <text x="586" y="121" text-anchor="middle" fill="#0d1117" font-size="11" font-weight="700">Phase 3</text>

  <rect x="536" y="142" width="100" height="34" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="586" y="157" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="500">Subtask 06</text>
  <text x="586" y="170" text-anchor="middle" fill="#8b949e" font-size="8">generalPurpose</text>

  <rect x="536" y="184" width="100" height="34" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="586" y="199" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="500">Subtask 07</text>
  <text x="586" y="212" text-anchor="middle" fill="#8b949e" font-size="8">shell</text>

  <!-- Arrow Phase 3 to Gate 3 -->
  <line x1="646" y1="195" x2="663" y2="195" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- === VERIFICATION GATE 3 === -->
  <g transform="translate(671, 150)">
    <polygon points="25,0 50,15 50,75 25,90 0,75 0,15" fill="#161b22" stroke="#d29922" stroke-width="2"/>
    <text x="25" y="40" text-anchor="middle" fill="#d29922" font-size="9" font-weight="700">Judge</text>
    <text x="25" y="52" text-anchor="middle" fill="#d29922" font-size="8">Gate</text>
    <text x="25" y="66" text-anchor="middle" fill="#8b949e" font-size="7">Verify</text>
  </g>

  <!-- Gate 3 pass arrow -->
  <line x1="721" y1="195" x2="738" y2="195" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="730" y="188" text-anchor="middle" fill="#3fb950" font-size="7">Pass</text>

  <!-- === PHASE 4 === -->
  <rect x="746" y="105" width="138" height="180" rx="6" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
  <rect x="746" y="105" width="138" height="24" rx="6" fill="#58a6ff"/>
  <text x="815" y="121" text-anchor="middle" fill="#0d1117" font-size="11" font-weight="700">Phase 4</text>

  <rect x="758" y="142" width="114" height="34" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="815" y="157" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="500">Subtask 08</text>
  <text x="815" y="170" text-anchor="middle" fill="#8b949e" font-size="8">generalPurpose</text>

  <rect x="758" y="184" width="114" height="34" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="815" y="199" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="500">Subtask 09</text>
  <text x="815" y="212" text-anchor="middle" fill="#8b949e" font-size="8">shell</text>

  <!-- Arrow from phases to final -->
  <line x1="480" y1="295" x2="480" y2="354" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="490" y="332" fill="#8b949e" font-size="9">All phases complete</text>

  <!-- Final verification -->
  <rect x="30" y="360" width="900" height="80" rx="6" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="30" y="360" width="900" height="24" rx="6" fill="#3fb950"/>
  <text x="480" y="376" text-anchor="middle" fill="#0d1117" font-size="12" font-weight="700">Final Verification</text>

  <rect x="60" y="396" width="200" height="32" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="160" y="416" text-anchor="middle" fill="#e6edf3" font-size="11">Run test suite</text>

  <rect x="280" y="396" width="200" height="32" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="380" y="416" text-anchor="middle" fill="#e6edf3" font-size="11">Check linter errors</text>

  <rect x="500" y="396" width="200" height="32" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="600" y="416" text-anchor="middle" fill="#e6edf3" font-size="11">Overall quality pass</text>

  <rect x="720" y="396" width="190" height="32" rx="4" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="815" y="416" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">Execution Report</text>

  <!-- Legend -->
  <text x="40" y="478" fill="#8b949e" font-size="10" font-weight="600">LEGEND</text>

  <rect x="40" y="492" width="14" height="14" rx="2" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="62" y="503" fill="#8b949e" font-size="10">Phase boundary</text>

  <polygon points="165,492 180,499 180,507 165,514 150,507 150,499" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="188" y="507" fill="#8b949e" font-size="10">Adversarial verification gate (zoto-spec-judge)</text>

  <line x1="420" y1="500" x2="450" y2="500" stroke="#3fb950" stroke-width="2"/>
  <text x="458" y="504" fill="#8b949e" font-size="10">Pass &#x2192; next phase proceeds</text>

  <line x1="630" y1="500" x2="660" y2="500" stroke="#f85149" stroke-width="2"/>
  <text x="668" y="504" fill="#8b949e" font-size="10">Fail &#x2192; execution blocked (retry/skip/abort)</text>

  <!-- Footer -->
  <text x="480" y="546" text-anchor="middle" fill="#8b949e" font-size="10">Dependency-driven phases &#x2014; subtasks within a phase share no dependencies and execute concurrently</text>
</svg>
